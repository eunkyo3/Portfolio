<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정은교 | 포트폴리오</title>
    <script>
      // GitHub Pages SPA fallback: send unknown deep links back to the app root
      // under the project base path so the client router can take over.
      (function () {
        var base = '/Portfolio/'
        if (window.location.pathname !== base) {
          window.location.replace(base)
        }
      })()
    </script>
  </head>

</html>
